[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "macrocenter-stock-checker"
version = "0.1.0"
description = "Stock and price snapshot collector"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
macrocenter-stock-checker = "macrocenter_stock_checker.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
